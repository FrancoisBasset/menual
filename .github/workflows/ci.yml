name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install project and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . "ruff>=0.15.20" "basedpyright>=1.39.9" pytest

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type-check
        run: basedpyright

      - name: Run tests
        run: pytest
