<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Menual — desktop application launcher</title>
  <desc id="desc">A colorful application launcher interface displayed inside a terminal window.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151225"/>
      <stop offset="0.52" stop-color="#231942"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8fab"/>
      <stop offset="0.5" stop-color="#c77dff"/>
      <stop offset="1" stop-color="#78dce8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="500" rx="34" fill="url(#background)"/>
  <circle cx="1018" cy="72" r="130" fill="#8b5cf6" opacity="0.13" filter="url(#glow)"/>
  <circle cx="106" cy="438" r="150" fill="#22d3ee" opacity="0.10" filter="url(#glow)"/>
  <path d="M0 385 C220 315 355 490 610 405 C850 325 1005 390 1200 300 V500 H0 Z" fill="#ffffff" opacity="0.025"/>

  <g transform="translate(72 72)">
    <rect width="82" height="82" rx="24" fill="url(#logo)"/>
    <path d="M23 58 V25 H34 L42 39 L50 25 H61 V58 H50 V41 L42 54 L34 41 V58 Z" fill="#151225"/>
    <text x="108" y="45" fill="#ffffff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="3">MENUAL</text>
    <text x="110" y="75" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18">Your desktop, one key away.</text>
  </g>

  <g transform="translate(590 48)" filter="url(#shadow)">
    <rect width="535" height="404" rx="24" fill="#fffaf4"/>
    <rect width="535" height="48" rx="24" fill="#262033"/>
    <rect y="24" width="535" height="24" fill="#262033"/>
    <circle cx="27" cy="24" r="7" fill="#ff6b81"/>
    <circle cx="50" cy="24" r="7" fill="#ffd166"/>
    <circle cx="73" cy="24" r="7" fill="#8ee9c3"/>
    <text x="267.5" y="31" text-anchor="middle" fill="#d8d4e3" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14">Menual</text>

    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#18202d" text-anchor="middle">
      <g transform="translate(28 78)">
        <rect width="146" height="112" rx="17" fill="#ff9bb5"/>
        <text x="73" y="64">Terminal</text>
      </g>
      <g transform="translate(194 78)">
        <rect width="146" height="112" rx="17" fill="#ffd166"/>
        <text x="73" y="64">Firefox</text>
      </g>
      <g transform="translate(360 78)">
        <rect width="146" height="112" rx="17" fill="#8ee9c3"/>
        <text x="73" y="64">Files</text>
      </g>
      <g transform="translate(28 216)">
        <rect width="146" height="112" rx="17" fill="#8ecaff"/>
        <text x="73" y="64">Code</text>
      </g>
      <g transform="translate(194 216)">
        <rect width="146" height="112" rx="17" fill="#c9a7ff"/>
        <text x="73" y="64">Music</text>
      </g>
      <g transform="translate(360 216)">
        <rect width="146" height="112" rx="17" fill="#ffb199"/>
        <text x="73" y="64">Settings</text>
      </g>
    </g>

    <text x="267.5" y="374" text-anchor="middle" fill="#687385" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">Python · Textual · Kitty · Hyprland</text>
  </g>

  <g transform="translate(76 218)" font-family="ui-sans-serif, system-ui, sans-serif">
    <text fill="#f8fafc" font-size="29" font-weight="760">A tiny launcher with a big personality.</text>
    <text y="48" fill="#aeb9cb" font-size="18">Fast. Colorful. Keyboard-friendly.</text>

    <g transform="translate(0 92)" font-size="15" font-weight="650">
      <rect width="150" height="38" rx="19" fill="#ffffff" opacity="0.09"/>
      <text x="75" y="25" text-anchor="middle" fill="#e2e8f0">⚡ Instant launch</text>
      <rect x="162" width="158" height="38" rx="19" fill="#ffffff" opacity="0.09"/>
      <text x="241" y="25" text-anchor="middle" fill="#e2e8f0">🎨 Adaptive grid</text>
      <rect y="50" width="164" height="38" rx="19" fill="#ffffff" opacity="0.09"/>
      <text x="82" y="75" text-anchor="middle" fill="#e2e8f0">⌨ Simple config</text>
      <rect x="176" y="50" width="144" height="38" rx="19" fill="#ffffff" opacity="0.09"/>
      <text x="248" y="75" text-anchor="middle" fill="#e2e8f0">🐧 Linux native</text>
    </g>
  </g>
</svg>
